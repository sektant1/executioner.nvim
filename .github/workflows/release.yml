name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREV"..HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "body<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
  luarocks:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: LuaRocks Upload
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        with:
          name: executioner.nvim
          summary: "Telescope-powered script runner for Neovim"
          detailed_description: |
            Discover scripts in your project, pick one from a Telescope picker,
            and run it in a terminal buffer.
          labels: |
            neovim
            telescope
            script-runner
          dependencies: |
            plenary.nvim
            telescope.nvim
