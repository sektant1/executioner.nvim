name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    name: Lint (stylua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ tests/

  test:
    name: Test (${{ matrix.os }} / nvim ${{ matrix.nvim }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        nvim: [v0.10.2, v0.11.0, nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Install Python (for py script tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: |
          nvim --headless --noplugin -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/executioner/ { minimal_init = 'tests/minimal_init.lua' }"

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          nvim --headless --noplugin -u tests/minimal_init.lua -c "PlenaryBustedDirectory tests/executioner/ { minimal_init = 'tests/minimal_init.lua' }"

  helptags:
    name: Verify helptags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly
      - name: Generate helptags
        run: nvim --headless -c "helptags doc/" -c "qa"
      - name: Ensure doc/tags was generated
        run: test -f doc/tags

  healthcheck:
    name: Healthcheck loads
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.0
      - name: Load plugin
        run: |
          nvim --headless -u tests/minimal_init.lua \
            -c "lua require('executioner').setup({})" \
            -c "qa"
      - name: Load build module
        run: |
          nvim --headless -u tests/minimal_init.lua \
            -c "lua require('executioner').setup({})" \
            -c "lua require('executioner.build')" \
            -c "lua require('executioner.build.detect')" \
            -c "qa"
